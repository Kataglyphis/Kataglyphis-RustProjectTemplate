name: Rust workflow on Windows 2025
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: pwsh

jobs:
  windows-pipeline:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message || '', '[build-win]') }}
    name: Build, test, and package (windows-2025)
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh
    env:
      BINARY: kataglyphis_rustprojecttemplate
      # Provide inputs for version computation script
      REF_NAME: ${{ github.ref_name }}
      RUN_NUMBER: ${{ github.run_number }}
      MSIX_PACKAGE_NAME: Kataglyphis.RustProjectTemplate
      MSIX_PUBLISHER: CN=Kataglyphis
      MSIX_PUBLISHER_DISPLAY_NAME: Kataglyphis
      MSIX_DISPLAY_NAME: Kataglyphis Rust Project Template
      MSIX_DESCRIPTION: Rust project template with optional GUI, ONNX backends, profiling, packaging, and CI workflows.

    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Compute version
        id: compute_version
        shell: bash
        run: Scripts/compute_version.sh

      - name: Cleanup disk space
        uses: ./.github/actions/cleanup-disk-space

      - name: Login to GitHub
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: Kataglyphis
          password: ${{ secrets.GHCR_PAT }}

      - name: Pull image
        run: docker pull ghcr.io/kataglyphis/kataglyphis_beschleuniger:winamd64

      - name: Build, test, and package MSIX
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Use MSIX_VERSION computed by the shared script
          $ver = "${{ env.MSIX_VERSION }}"

            docker run --rm `
            --env BINARY="${{ env.BINARY }}" `
            --env VERSION="$ver" `
            --env MSIX_PACKAGE_NAME="${{ env.MSIX_PACKAGE_NAME }}" `
            --env MSIX_PUBLISHER="${{ env.MSIX_PUBLISHER }}" `
            --env MSIX_PUBLISHER_DISPLAY_NAME="${{ env.MSIX_PUBLISHER_DISPLAY_NAME }}" `
            --env MSIX_DISPLAY_NAME="${{ env.MSIX_DISPLAY_NAME }}" `
            --env MSIX_DESCRIPTION="${{ env.MSIX_DESCRIPTION }}" `
            --env MSIX_VERSION="$ver" `
            --mount "type=bind,source=${{ github.workspace }},target=C:\workspace" `
            -w "C:\workspace" `
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:winamd64 `
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File `
            "C:\workspace\Scripts\Windows\Build-Windows.ps1"

      - name: Prepare archive variables
        id: vars
        run: |
          # Use version computed by shared script
          $ver = "$env:VERSION"
          $archive = "$env:BINARY-$ver-windows-2025-x64.zip"
          echo "archive_name=$archive" >> $env:GITHUB_OUTPUT
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create archive
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = "${{ steps.vars.outputs.version }}"
          $archive = "${{ steps.vars.outputs.archive_name }}"

          docker run --rm `
            --mount "type=bind,source=${{ github.workspace }},target=C:\workspace" `
            -w "C:\workspace" `
            -e "BINARY=${{ env.BINARY }}" `
            -e "VERSION=$ver" `
            -e "PLATFORM=windows-2025" `
            -e "ARCH=x64" `
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:winamd64 `
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File `
            "C:\workspace\ExternalLib\Kataglyphis-ContainerHub\windows\scripts\rust\New-Archive.ps1"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ env.BINARY }}-${{ steps.vars.outputs.version }}-windows-2025-x64
          path: dist/${{ steps.vars.outputs.archive_name }}

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ env.MSIX_PACKAGE_NAME }}-${{ steps.vars.outputs.version }}-x64-msix
          path: dist/msix/*.msix

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ env.BINARY }}-${{ steps.vars.outputs.version }}-x64-msi
          path: dist/msi/*.msi
