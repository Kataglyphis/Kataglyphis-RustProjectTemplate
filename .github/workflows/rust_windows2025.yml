name: Rust workflow on Windows 2025
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: pwsh

jobs:
  windows-pipeline:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message || '', '[build-win]') }}
    name: Build, test, and package (windows-2025)
    runs-on: windows-2025
    env:
      BINARY: kataglyphis_rustprojecttemplate
      VERSION: ${{ github.ref_name }}
      MSIX_PACKAGE_NAME: Kataglyphis.RustProjectTemplate
      MSIX_PUBLISHER: CN=Kataglyphis
      MSIX_PUBLISHER_DISPLAY_NAME: Kataglyphis
      MSIX_DISPLAY_NAME: Kataglyphis Rust Project Template
      MSIX_DESCRIPTION: Rust project template with optional GUI, ONNX backends, profiling, packaging, and CI workflows.

    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - name: 📥 Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cleanup disk space
        uses: ./.github/actions/cleanup-disk-space

      - name: Login to GitHub
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: Kataglyphis
          password: ${{ secrets.GHCR_PAT }}

      - name: Pull image
        run: docker pull ghcr.io/kataglyphis/kataglyphis_beschleuniger:winamd64

      - name: Run build inside container
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          docker run --rm `
            --env BINARY="${{ env.BINARY }}" `
            --env VERSION="${{ env.VERSION }}" `
            --mount "type=bind,source=${{ github.workspace }},target=C:\workspace" `
            -w "C:\workspace" `
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:winamd64 `
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File `
            "C:\workspace\ExternalLib\Kataglyphis-ContainerHub\windows\scripts\rust\Build-Windows.ps1"

      - name: 📦 Create MSIX package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          $ver = "${{ env.VERSION }}" -replace '^v',''
          if ($ver -match '^\d+\.\d+\.\d+$') { $ver = "$ver.0" }
          if (-not ($ver -match '^\d+\.\d+\.\d+\.\d+$')) { $ver = "0.1.0.0" }

          docker run --rm `
            --mount "type=bind,source=${{ github.workspace }},target=C:\workspace" `
            -w "C:\workspace" `
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:winamd64 `
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File `
            "C:\workspace\ExternalLib\Kataglyphis-ContainerHub\windows\scripts\rust\New-MsixPackage.ps1" `
            -Workspace "C:\workspace" `
            -Binary "${{ env.BINARY }}" `
            -PackageName "${{ env.MSIX_PACKAGE_NAME }}" `
            -Publisher "${{ env.MSIX_PUBLISHER }}" `
            -PublisherDisplayName "${{ env.MSIX_PUBLISHER_DISPLAY_NAME }}" `
            -DisplayName "${{ env.MSIX_DISPLAY_NAME }}" `
            -Description "${{ env.MSIX_DESCRIPTION }}" `
            -Version $ver `
            -CargoTargetDir "target" `
            -SkipBuild

      - name: 📦 Create archive
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          $ver = "${{ env.VERSION }}" -replace '^v',''
          if ($ver -match '^\d+\.\d+\.\d+$') { $ver = "$ver.0" }
          if (-not ($ver -match '^\d+\.\d+\.\d+\.\d+$')) { $ver = "0.1.0.0" }

          docker run --rm `
            --mount "type=bind,source=${{ github.workspace }},target=C:\workspace" `
            -w "C:\workspace" `
            -e "BINARY=${{ env.BINARY }}" `
            -e "VERSION=$ver" `
            -e "PLATFORM=windows-2025" `
            -e "ARCH=x64" `
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:winamd64 `
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File `
            "C:\workspace\ExternalLib\Kataglyphis-ContainerHub\windows\scripts\rust\New-Archive.ps1"

      - name: 📦 Prepare archive variables
        id: vars
        run: |
          $archive = "$env:BINARY-$env:VERSION-windows-2025-x64.zip"
          echo "archive_name=$archive" >> $env:GITHUB_OUTPUT

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ env.BINARY }}-${{ github.ref_name }}-windows-2025-x64
          path: dist/${{ steps.vars.outputs.archive_name }}

      - name: 📤 Upload MSIX artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ env.MSIX_PACKAGE_NAME }}-${{ github.ref_name }}-x64-msix
          path: dist/msix/*.msix
