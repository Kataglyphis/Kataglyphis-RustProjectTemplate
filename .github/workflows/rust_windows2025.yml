name: Rust workflow on Windows 2025
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: pwsh

jobs:
  windows-pipeline:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message || '', '[build-win]') }}
    name: Build, test, and package (windows-2025)
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh
    env:
      BINARY: kataglyphis_rustprojecttemplate
      WINDOWS_CONTAINER_IMAGE: ghcr.io/kataglyphis/kataglyphis_beschleuniger:winamd64
      WINDOWS_DOCKER_CPUS: '4'
      WINDOWS_DOCKER_MEMORY: 16g
      WINDOWS_PACKAGE_FEATURES: gui_windows,onnxruntime_directml
      # Provide inputs for version computation script
      REF_NAME: ${{ github.ref_name }}
      RUN_NUMBER: ${{ github.run_number }}
      MSIX_PACKAGE_NAME: Kataglyphis.RustProjectTemplate
      MSIX_PUBLISHER: CN=Kataglyphis
      MSIX_PUBLISHER_DISPLAY_NAME: Kataglyphis
      MSIX_DISPLAY_NAME: Kataglyphis Rust Project Template
      MSIX_DESCRIPTION: Rust project template with optional GUI, ONNX backends, profiling, packaging, and CI workflows.

    steps:
      #- name: Enable Git long paths
      #  run: git config --global core.longpaths true

      # Windows MAX_PATH is the whole problem here. The runner workspace is
      # D:\a\<repo>\<repo> (repo name doubled, ~75 chars), and the nested
      # submodule chain - RustProjectTemplate -> ContainerHub -> DocumANTation
      # -> md2pdfLib -> latex/{smile,awesome-beamer} - pushes
      # .git/modules/.../objects/pack/pack-*.keep past 260 characters. A
      # recursive checkout here dies with "Filename too long" and
      # "fatal: '$GIT_DIR' too big" before any build step runs. So check out
      # WITHOUT submodules, then clone the whole tree into a SHORT path where
      # the same chain fits, and build from there. Mirrors the fix already
      # proven in BeschleunigerBallett's Windows lane.
      - name: Checkout repository (no submodules; see the short-path clone below)
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
          submodules: false

      - name: Clone full tree with submodules into a short path (D:\ws)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global core.longpaths true
          # .gitmodules pins git@github.com: (SSH) for ContainerHub and the
          # runner has no SSH key; rewrite to token HTTPS as checkout would.
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"
          rm -rf /d/ws
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" /d/ws
          git -C /d/ws checkout --force "${{ github.sha }}"
          git -C /d/ws submodule update --init --recursive

      - name: Compute version
        id: compute_version
        shell: bash
        run: Scripts/compute_version.sh

      - name: Cleanup disk space
        uses: Kataglyphis/Kataglyphis-ContainerHub/.github/actions/cleanup-disk-space@main

      - name: Login to GitHub
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: Kataglyphis
          password: ${{ secrets.GHCR_PAT }}

      - name: Pull image
        run: docker pull ${{ env.WINDOWS_CONTAINER_IMAGE }}

      - name: Run debug unit, integration, and fuzz tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          docker run --rm `
            --memory "${{ env.WINDOWS_DOCKER_MEMORY }}" `
            --cpus ${{ env.WINDOWS_DOCKER_CPUS }} `
            --env CARGO_TERM_COLOR="${{ env.CARGO_TERM_COLOR }}" `
            --env CARGO_BUILD_JOBS="${{ env.WINDOWS_DOCKER_CPUS }}" `
            --mount "type=bind,source=D:\ws,target=C:\ws" `
            -w "C:\ws" `
            ${{ env.WINDOWS_CONTAINER_IMAGE }} `
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File `
            "C:\ws\Scripts\Windows\Invoke-DebugTests.ps1"

      - name: Build and run all Windows app configs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          docker run --rm `
            --memory "${{ env.WINDOWS_DOCKER_MEMORY }}" `
            --cpus ${{ env.WINDOWS_DOCKER_CPUS }} `
            --env CARGO_TERM_COLOR="${{ env.CARGO_TERM_COLOR }}" `
            --env CARGO_BUILD_JOBS="${{ env.WINDOWS_DOCKER_CPUS }}" `
            --mount "type=bind,source=D:\ws,target=C:\ws" `
            -w "C:\ws" `
            ${{ env.WINDOWS_CONTAINER_IMAGE }} `
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File `
            "C:\ws\Scripts\Windows\Invoke-WindowsConfigMatrix.ps1"

      - name: Build, lint, and package MSIX/MSI
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Use MSIX_VERSION computed by the shared script
          $ver = "${{ env.MSIX_VERSION }}"

            docker run --rm `
            --memory "${{ env.WINDOWS_DOCKER_MEMORY }}" `
            --cpus ${{ env.WINDOWS_DOCKER_CPUS }} `
            --env BINARY="${{ env.BINARY }}" `
            --env VERSION="$ver" `
            --env CARGO_TERM_COLOR="${{ env.CARGO_TERM_COLOR }}" `
            --env CARGO_BUILD_JOBS="${{ env.WINDOWS_DOCKER_CPUS }}" `
            --env CARGO_FEATURES="${{ env.WINDOWS_PACKAGE_FEATURES }}" `
            --env MSIX_PACKAGE_NAME="${{ env.MSIX_PACKAGE_NAME }}" `
            --env MSIX_PUBLISHER="${{ env.MSIX_PUBLISHER }}" `
            --env MSIX_PUBLISHER_DISPLAY_NAME="${{ env.MSIX_PUBLISHER_DISPLAY_NAME }}" `
            --env MSIX_DISPLAY_NAME="${{ env.MSIX_DISPLAY_NAME }}" `
            --env MSIX_DESCRIPTION="${{ env.MSIX_DESCRIPTION }}" `
            --env MSIX_VERSION="$ver" `
            --mount "type=bind,source=D:\ws,target=C:\ws" `
            -w "C:\ws" `
            ${{ env.WINDOWS_CONTAINER_IMAGE }} `
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File `
            "C:\ws\Scripts\Windows\Build-Windows.ps1" `
            -SkipTests

      - name: Prepare archive variables
        id: vars
        run: |
          # Use version computed by shared script
          $ver = "$env:VERSION"
          $archive = "$env:BINARY-$ver-windows-2025-x64.zip"
          echo "archive_name=$archive" >> $env:GITHUB_OUTPUT
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create archive
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = "${{ steps.vars.outputs.version }}"
          $archive = "${{ steps.vars.outputs.archive_name }}"

          docker run --rm `
            --memory "${{ env.WINDOWS_DOCKER_MEMORY }}" `
            --cpus ${{ env.WINDOWS_DOCKER_CPUS }} `
            --mount "type=bind,source=D:\ws,target=C:\ws" `
            -w "C:\ws" `
            -e "BINARY=${{ env.BINARY }}" `
            -e "VERSION=$ver" `
            -e "PLATFORM=windows-2025" `
            -e "ARCH=x64" `
            -e "CARGO_BUILD_JOBS=${{ env.WINDOWS_DOCKER_CPUS }}" `
            ${{ env.WINDOWS_CONTAINER_IMAGE }} `
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File `
            "C:\ws\ExternalLib\Kataglyphis-ContainerHub\windows\scripts\rust\New-Archive.ps1"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.BINARY }}-${{ steps.vars.outputs.version }}-windows-2025-x64
          path: D:/ws/dist/${{ steps.vars.outputs.archive_name }}

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.MSIX_PACKAGE_NAME }}-${{ steps.vars.outputs.version }}-x64-msix
          path: D:/ws/dist/msix/*.msix

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.BINARY }}-${{ steps.vars.outputs.version }}-x64-msi
          path: D:/ws/dist/msi/*.msi
