name: Rust workflow on Ubuntu-24.04 (x86_64/ARM)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-pipeline:
    name: Build, test, package, and docs (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            arch: x64
            coverage_name: coverage-report
            artifact_suffix: ubuntu-24.04-x64
            docs: true
          - name: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            coverage_name: coverage-report-arm64
            artifact_suffix: ubuntu-24.04-arm64
            docs: false
    env:
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}
      BINARY: kataglyphis-rustprojecttemplate
      BINARY_FILE: kataglyphis_rustprojecttemplate
      # VERSION will be computed by the shared script (see step "Compute version")
      REF_NAME: ${{ github.ref_name }}
      RUN_NUMBER: ${{ github.run_number }}
      PACKAGE_TYPES: tar,deb,AppImage,Flatpak
    steps:
      - name: Free Disk Space on Host
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: 📥 Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Compute version
        id: compute_version
        run: |
          bash Scripts/compute_version.sh
        shell: bash

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull container image (once)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i to pull container..."
            if timeout 900 docker pull ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest; then
              echo "Successfully pulled container"
              exit 0
            fi
            echo "Pull failed, waiting before retry..."
            sleep 30
          done
          echo "Failed to pull container after 3 attempts"
          exit 1

      - name: Debug build
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_debug.sh
            '

      - name: Verify MSRV (1.92.0)
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            rust:1.92.0 \
            bash -lc \'
            set -e
            git config --global --add safe.directory /workspace || true
            cargo check --workspace --all-features
            \'

      - name: Security checks (cargo audit + cargo deny)
        continue-on-error: false
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_security_checks.sh
            '

      - name: Check formatting
        continue-on-error: true
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \   
            -v ${{ github.workspace }}:/workspace \  
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            apt-get update && apt-get install -y libunwind-dev libdw-dev libgtk-4-dev
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_fmt_clippy.sh
          '

      - name: Run unit, integration, and doc tests
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_test.sh
            '

      - name: Run coverage
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_coverage.sh
            '

      # coverage reports are uploaded together with other artifacts later

      - name: Run benchmarks
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_bench.sh
            '

      - name: 🛠️ Build release binary
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_release.sh
            '

      - name: 📦 Create archive (tar, deb, AppImage, Flatpak)
        run: |
          # Run the packaging container and expose /dev/fuse into it so AppImage
          # creation can use FUSE. Passing --device is preferred to --privileged.
          # Ask AppImage binaries to extract-and-run instead of using FUSE. This
          # avoids needing --privileged or kernel FUSE on the runner.
          docker run --rm \
            --privileged \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/06-packaging/package_archive.sh \
              --binary "${BINARY}" \
              --binary-file "${BINARY_FILE}" \
              --binary-path "target/release/${BINARY_FILE}" \
              --version "${VERSION}" \
              --package-types "${PACKAGE_TYPES}" \
              --platform "${PLATFORM}" \
              --arch "${ARCH}" \
              --flatpak-manifest "packaging/flatpak/kataglyphis.flatpak.json" \
              --desktop-file "packaging/flatpak/kataglyphis.desktop" \
              --icon-file "packaging/flatpak/icon.png" \
              --archive-out-file "dist/archive_path.txt" \
              --no-github-output
            '

      - name: Read package archive path
        if: always()
        id: package
        run: |
          if [ -f dist/archive_path.txt ]; then
            echo "archive_path=$(cat dist/archive_path.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "archive_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: 📦 Prepare archive variables
        shell: bash
        id: vars
        run: |
          # Use VERSION from env (set by compute_version.sh)
          VERSION_SAFE=${VERSION//\//-}
          echo "archive_name=${BINARY}-${VERSION_SAFE}-${{ matrix.runner }}-${ARCH}.tar.gz" >> "$GITHUB_OUTPUT"
          
      - name: Upload all artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ env.BINARY }}-${{ github.ref_name }}-${{ matrix.artifact_suffix }}-all
          path: |
            tarpaulin-report.html
            tarpaulin-report.xml
            target/release/${{ env.BINARY_FILE }}
            dist/**
            dist/*.flatpak
          
      - name: Create docs
        if: matrix.docs
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_build_doc.sh
            '

      - name: Fix permissions on generated docs
        if: matrix.docs
        run: |
          sudo chown -R $USER:$USER ./target/doc

      - name: 📂 Sync files to domain
        if: matrix.docs
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PW }}
          local-dir: "./target/doc/"

        
