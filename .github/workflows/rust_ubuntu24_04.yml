name: Rust workflow on Ubuntu-24.04 (x86_64/ARM)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-pipeline:
    name: Build, test, package, and docs (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            arch: x64
            coverage_name: coverage-report
            artifact_suffix: ubuntu-24.04-x64
            docs: true
          - name: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            coverage_name: coverage-report-arm64
            artifact_suffix: ubuntu-24.04-arm64
            docs: false
    env:
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}
      BINARY: kataglyphis-rustprojecttemplate
      BINARY_FILE: kataglyphis_rustprojecttemplate
      # VERSION will be computed by the shared script (see step "Compute version")
      REF_NAME: ${{ github.ref_name }}
      RUN_NUMBER: ${{ github.run_number }}
      PACKAGE_TYPES: tar,deb,AppImage,Flatpak
    steps:
      - name: Free Disk Space on Host
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: 📥 Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Compute version
        id: compute_version
        run: |
          bash .github/scripts/compute_version.sh
        shell: bash

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull container image (once)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i to pull container..."
            if timeout 900 docker pull ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest; then
              echo "Successfully pulled container"
              exit 0
            fi
            echo "Pull failed, waiting before retry..."
            sleep 30
          done
          echo "Failed to pull container after 3 attempts"
          exit 1

      - name: Debug build
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_debug.sh --features with_cxxbridge
            '

      - name: Security checks (cargo audit + cargo deny)
        continue-on-error: true
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_security_checks.sh
            '

      - name: Check formatting
        continue-on-error: true
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_fmt_clippy.sh --features with_cxxbridge
            '

      - name: Run unit, integration, and doc tests
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_test.sh --features with_cxxbridge
            '

      - name: Run coverage
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_coverage.sh --features with_cxxbridge
            '

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.coverage_name }}
          path: |
            tarpaulin-report.html
            tarpaulin-report.xml

      - name: Run benchmarks
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_bench.sh --features with_cxxbridge
            '

      - name: 🛠️ Build release binary
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_release.sh --features with_cxxbridge
            '

      - name: Ensure FUSE available on runner
        run: |
          echo "Installing FUSE packages on runner and attempting to load kernel module..."
          sudo apt-get update
          # Install userland and runtime libraries commonly required by AppImage
          sudo apt-get install -y --no-install-recommends fuse libfuse2 || true
          # Try to load the fuse kernel module; non-fatal if it fails on hosted runners
          sudo modprobe fuse || true

      - name: 📦 Create archive (tar, deb, AppImage, Flatpak)
        run: |
          # Try to load the FUSE kernel module on the runner so the container can
          # use /dev/fuse. This requires sudo; failure is non-fatal here so we can
          # surface a helpful error from the packaging step instead of hard-failing
          # early.
          echo "Attempting to load FUSE kernel module on runner..."
          sudo modprobe fuse || true

          # Run the packaging container and expose /dev/fuse into it so AppImage
          # creation can use FUSE. Passing --device is preferred to --privileged.
          docker run --rm \
            --device /dev/fuse \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BINARY=${{ env.BINARY }} \
            -e BINARY_FILE=${{ env.BINARY_FILE }} \
            -e VERSION=${{ env.VERSION }} \
            -e PLATFORM=${{ env.PLATFORM }} \
            -e ARCH=${{ env.ARCH }} \
            -e PACKAGE_TYPES=${{ env.PACKAGE_TYPES }} \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            # Ensure basic packaging tools are available in the container (best-effort)
              if command -v apt-get >/dev/null 2>&1; then
              apt-get update
              # Install both libfuse2 (required by many AppImages) and libfuse3
              apt-get install -y --no-install-recommends ca-certificates wget xz-utils libfuse2 libfuse3-3 flatpak build-essential
            fi
            # Install appimagetool if missing. Prefer an architecture-matching
            # binary: use the aarch64 AppImage on arm64 runners to avoid Exec
            # format errors when executing the downloaded file.
            if ! command -v appimagetool >/dev/null 2>&1; then
              echo "Installing appimagetool..."
              if [ "${ARCH:-}" = "arm64" ] || [[ "${{ matrix.runner }}" == *"arm"* ]]; then
                wget -q -O /usr/local/bin/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage || \
                  wget -q -O /usr/local/bin/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
              else
                wget -q -O /usr/local/bin/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
              fi
              chmod +x /usr/local/bin/appimagetool || true
            fi
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/package_archive.sh
            '

      - name: 📦 Prepare archive variables
        shell: bash
        id: vars
        run: |
          # Use VERSION from env (set by compute_version.sh)
          VERSION_SAFE=${VERSION//\//-}
          echo "archive_name=${BINARY}-${VERSION_SAFE}-${{ matrix.runner }}-${ARCH}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ env.BINARY }}-${{ github.ref_name }}-${{ matrix.artifact_suffix }}
          # Upload any generated tarball in dist/ so the step is resilient to
          # minor filename differences coming from the packaging script.
          path: dist/*.tar.gz
      - name: Create docs
        if: matrix.docs
        run: |
          docker run --rm \
            --platform ${{ env.PLATFORM }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/kataglyphis/kataglyphis_beschleuniger:latest \
            bash -lc '
            set -e
            git config --global --add safe.directory /workspace || true
            bash ExternalLib/Kataglyphis-ContainerHub/linux/scripts/rust/cargo_build_doc.sh
            '

      - name: Fix permissions on generated docs
        if: matrix.docs
        run: |
          sudo chown -R $USER:$USER ./target/doc

      - name: 📂 Sync files to domain
        if: matrix.docs
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PW }}
          local-dir: "./target/doc/"

  flatpak-build:
    name: Build Flatpak
    runs-on: ubuntu-24.04
    needs: linux-pipeline
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends flatpak flatpak-builder

      - name: Copy release binary
        run: |
          mkdir -p packaging/flatpak/build-dir
          cp target/release/kataglyphis_rustprojecttemplate packaging/flatpak/build-dir/

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --force-clean --repo=packaging/flatpak/repo packaging/flatpak/build-dir packaging/flatpak/kataglyphis.flatpak.json

      - name: Export Flatpak archive
        run: |
          mkdir -p dist
          if [ -d packaging/flatpak/repo ]; then
            flatpak build-bundle packaging/flatpak/repo dist/kataglyphis.flatpak  io.kataglyphis.Kataglyphis 1.0
          else
            echo "Flatpak repo not found; skipping bundle creation"
            exit 1
          fi

        
